name: Python CI - ML Pipeline Validation

on:
  push:
      branches: [ main ]
        pull_request:
            branches: [ main ]

            jobs:
              build:
                  runs-on: ubuntu-latest

                      steps:
                          - name: Checkout repository
                                uses: actions/checkout@v3

                                    - name: Set up Python 3.10
                                          uses: actions/setup-python@v4
                                                with:
                                                        python-version: "3.10"

                                                            - name: Install dependencies
                                                                  run: |
                                                                          python -m pip install --upgrade pip
                                                                                  pip install pandas numpy matplotlib seaborn scikit-learn jupyter nbconvert

                                                                                      - name: Validate Jupyter Notebooks
                                                                                            run: |
                                                                                                    for nb in *.ipynb; do
                                                                                                              if [ -f "$nb" ]; then
                                                                                                                          echo "Checking notebook: $nb"
                                                                                                                                      jupyter nbconvert --to script "$nb" --stdout > /dev/null && echo "PASS" || echo "WARN"
                                                                                                                                                fi
                                                                                                                                                        done
                                                                                                                                                        
                                                                                                                                                            - name: Test Scikit-learn Pipeline Import
                                                                                                                                                                  run: |
                                                                                                                                                                          python -c "from sklearn.pipeline import Pipeline; print('Scikit-learn Pipeline import successful')"
                                                                                                                                                                          
                                                                                                                                                                              - name: CI Complete
                                                                                                                                                                                    run: echo "Python CI completed successfully!"
